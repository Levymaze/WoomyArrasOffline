<body oncontextmenu=return!1>
  <div class=gameAreaWrapper id=gameAreaWrapper>
    <canvas id=gameCanvas tabindex=0></canvas>
  </div>
  <div id=mainMenu>
    <div class=background></div>
    <div class=outsideWrapper>
      <div class=insideWrapper>
        <div class="miniWrapper discordHolder">
          <iframe frameborder=0 title="Discord Widget" allowtransparency=true class=discordWidget src="https://discord.com/widget?id=945134461622812692&theme=dark"></iframe>
        </div>
        <div class="miniWrapper middleWrapper" style=flex-wrap:nowrap>
          <p class=serversText>
            <b>Woomy Arras</b>
          </p>
          <div class="miniWrapper serversContainer">
            <!-- <p class=serversText id=serversText>-->
              <!-- <b>Servers</b>   -->
            <div class=serversHolder id=serverSelector>
              <p id=loadingServersText>Fetching server data...
            </div>
          </div>
          <div class="miniWrapper serversContainer">
            <p class=gamemodeText>Gamemode</p>
            <select class=animationsInput id=gamemode>
              <option value=menuSection1 disabled>--- FFA ---
              <option value=ffa>Free For All
              <option value=maze>Maze
              <option value=ppffa disabled>Portal Free For All (broken)
			  <option value=twfr disabled>Trench Warfare (broken)
              <option value=menuSectionGrowth disabled>--- GROWTH MODES ---
              <option value=growth>Growth (FFA)
              <option value=growthtesting>Growth Testing (FFA)
              <option value=growthmaze>Growth Maze (FFA)
              <option value=growthtdm>Growth TDM
              <option value=growthmazetdm>Growth Maze TDM
              <option value=growthboss>Growth Siege (Boss Rush)
              <option value=growthbossv2>Growth Siege V2 (Boss Rush)
              <option value=menuSection2 disabled>--- TDM ---
              <option value=2dom>2TDM Domination
              <option value=2mot>2TDM Mothership
              <option value=p2mot>2 TDM Portal Mothership
              <option value=2tag>2TDM Tag
              <option value=4dom>4TDM Domination
              <option value=4mot>4TDM Mothership
              <option value=4tag>4TDM Tag
              <option value=4tdm>4TDM
              <option value=tdm>3TDM
              <option value=mazetdm>Maze TDM
              <option value=menuSection3 disabled>--- MISC ---
              <option value=boss>Boss Rush
              <option value=carrierBattle>Carrier Battle
              <option value=crptTanks disabled>Corrupt Tanks (broken)
              <option value=ranked>Ranked
              <option value=testing>Testing
              <option value=dev>Development
              <option value=menuSection4 disabled>--- ORIGINALS ---
              <option value=brawlffaSmall>Brawl (Small)
              <option value=brawlffaLarge>Brawl (Large)
              <option value=longHallway>Long Hallway
              <option value=rockHell>Rock Hell
              <option value=2skrim>2TDM Skrimish
              <option value=4skrim>4TDM Skrimish
            </select>
          </div>
          <div class="miniWrapper playerInputsContainer">
            <input class=playerInput id=playerNameInput placeholder=Name>
            <input class=playerInput id=playerKeyInput placeholder=Token type=password>
            <button id=startButton class=playerButton>Play</button>
            <button id=teamSelectButton class=playerButton>Team: Auto</button>
          </div>
        </div>
        <div class="miniWrapper patchNotesHolder">
          <p class=patchNotesTitle>Changelog</p>
          <iframe frameborder=0 title="Patch Notes" id=patchNotesIFrame onload='this.src||(this.src="./changelog.html?a="+Date.now()+"&type="+localStorage.menuType)' seamless>Patch notes should go here. If you are see this message, then something went wrong!</iframe>
        </div>
        <div class="miniWrapper underMenuHolder">
          <div class="miniWrapper animationsContainer">
            <p class=animationsText>Menu Animations</p>
            <select class=animationsInput id=optAnimation tabindex=-1>
              <option value=snow>Snow
              <option value=fireworks>Fireworks
              <option value=balls>Balls
              <option value=spiral>Spiral
              <option value=circleSpinnyThing>Spiin
              <option value=none>None
            </select>
          </div>
          <div class="miniWrapper buttonsContainer">
            <p class=buttonsText>Links & Info
            <div class="miniWrapper buttonsHolder">
              <button onclick=displayMission()>Our Mission</button>
              <button onclick=displayDisclaimer()>Disclaimer</button>
              <button onclick=displayControls()>Controls</button>
              <button onclick='openLink("An inventation to join the offical discord","https://discord.gg/FgxE4eVbtH")'>Discord</button>
              <button onclick='openLink("A link to the offical world record sheet","https://docs.google.com/spreadsheets/d/1pWbywG5Gmcllv8fuvgikGVFR_RsEQNKMZ0Dn1SG0eoY/edit#gid=67864041")'>World Records</button>
              <button onclick='openLink("A link to the offical google form to submit records","https://docs.google.com/forms/d/e/1FAIpQLSdZgE5BGVwoIp5UpFH5LoV2_95C6oDCQkcew2U0kCtmBcFgYw/viewform?usp=sf_link")'>Submit a record</button>
              <button onclick='openLink("A link to the GitHub Repo for this game","https://github.com/")'>Github</button>
              <button onclick='localStorage.menuType="old",location.reload()'>Old Menu</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class=popupContainer id=popupContainer>
      <div class=popup id=infoPopup style=display:none>
        <p class=popupTitle id=infoPopup-Title>Title
        <p class=popupBody id=infoPopup-Body>Message</p>
        <button id=openLinkTabButton style=display:none>Open</button>
        <button onclick=fadePopupOut() id=infoPopup-close>Close</button>
      </div>
    </div>
  </div>
